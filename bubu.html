<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒泡排序法 (Bubble Sort) 視覺化工具</title>
    <style>
        :root {
            --bar-color: #3498db;
            --compare-color: #f1c40f;
            --sorted-color: #2ecc71;
            --background-color: #ecf0f1;
            --text-color: #2c3e50;
            --header-color: #34495e;
            --card-bg-color: #ffffff;
            --font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            --shadow-color: rgba(0,0,0,0.1);
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--header-color);
        }

        h1 {
            font-size: 2.5rem;
        }

        .visualization-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        #bar-container {
            display: flex;
            align-items: flex-end;
            height: 250px;
            width: 100%;
            border-bottom: 2px solid #bdc3c7;
        }

        .bar {
            flex-grow: 1;
            background-color: var(--bar-color);
            margin: 0 2px;
            transition: height 0.3s ease, background-color 0.3s ease;
            position: relative;
        }

        .bar-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--text-color);
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        button {
            background-color: var(--header-color);
            color: var(--background-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin: 0 10px;
        }

        button:hover {
            opacity: 0.8;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← 回首頁</a>
    <div class="container">
        <header>
            <h1>冒泡排序法 (Bubble Sort) 視覺化工具</h1>
        </header>

        <main>
            <div class="card">
                <h2>視覺化展示</h2>
                <div class="visualization-area">
                    <div id="bar-container"></div>
                    <div class="controls">
                        <button id="start-sort-btn">開始排序</button>
                        <button id="next-step-btn">下一步</button>
                        <button id="reset-btn">重設陣列</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const barContainer = document.getElementById('bar-container');
        const startSortBtn = document.getElementById('start-sort-btn');
        const nextStepBtn = document.getElementById('next-step-btn');
        const resetBtn = document.getElementById('reset-btn');

        let data = [38, 27, 43, 3, 9, 82, 10];
        let steps = [];
        let currentStep = 0;

        const renderBars = (highlightIndices = []) => {
            barContainer.innerHTML = '';
            data.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value * 3}px`;

                if (highlightIndices.includes(index)) {
                    bar.style.backgroundColor = 'var(--compare-color)';
                }

                const label = document.createElement('span');
                label.classList.add('bar-label');
                label.innerText = value;
                bar.appendChild(label);

                barContainer.appendChild(bar);
            });
        };

        const bubbleSort = () => {
            steps = [];
            for (let i = 0; i < data.length - 1; i++) {
                for (let j = 0; j < data.length - i - 1; j++) {
                    steps.push({ type: 'compare', indices: [j, j + 1] });
                    if (data[j] > data[j + 1]) {
                        [data[j], data[j + 1]] = [data[j + 1], data[j]];
                        steps.push({ type: 'swap', indices: [j, j + 1] });
                    }
                }
            }
            currentStep = 0;
        };

        const executeStep = () => {
            if (currentStep >= steps.length) return;

            const step = steps[currentStep];
            if (step.type === 'compare') {
                renderBars(step.indices);
            } else if (step.type === 'swap') {
                const [i, j] = step.indices;
                [data[i], data[j]] = [data[j], data[i]];
                renderBars([i, j]);
            }

            currentStep++;
        };

        const resetArray = () => {
            data = Array.from({ length: 8 }, () => Math.floor(Math.random() * 100) + 1);
            bubbleSort();
            renderBars();
        };

        startSortBtn.addEventListener('click', async () => {
            while (currentStep < steps.length) {
                executeStep();
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        });

        nextStepBtn.addEventListener('click', executeStep);
        resetBtn.addEventListener('click', resetArray);

        resetArray();
    </script>
</body>
</html>
