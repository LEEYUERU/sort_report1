<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演算法視覺化教學平台</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #ecf0f1;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --shadow: rgba(0,0,0,0.1);
            --font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }

        body.dark-mode {
            --primary-color: #3498db;
            --bg-color: #2c3e50;
            --text-color: #ecf0f1;
            --card-bg: #34495e;
            --shadow: rgba(0,0,0,0.3);
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .subtitle {
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 10px 20px var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--shadow);
            border-color: var(--primary-color);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .card h2 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        #theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: var(--card-bg);
            color: var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 10px var(--shadow);
            font-size: 1.5rem;
            transition: transform 0.2s;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <header>
        <h1>演算法視覺化教學平台</h1>
        <p class="subtitle">探索電腦科學的奧秘，透過互動式動畫學習經典演算法</p>
    </header>

    <div class="grid">
        <a href="bubble_sort_visualizer.html" class="card">
            <div class="icon">🫧</div>
            <h2>氣泡排序法</h2>
            <p>Bubble Sort</p>
            <p style="font-size: 0.9em; opacity: 0.8;">最基礎的交換排序，觀察元素如何像氣泡般浮出水面。</p>
        </a>
        
        <!-- 未來可以在這裡複製上面的 <a> 標籤來新增更多演算法 -->
    </div>

    <div id="theme-toggle" title="切換主題">🌙</div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        // 讀取儲存的主題設定
        if(localStorage.getItem('theme') === 'dark-mode') {
            body.classList.add('dark-mode');
            toggle.textContent = '☀️';
        }

        toggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            toggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark-mode' : '');
        });
    </script>
</body>
</html>
